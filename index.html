<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="background: #10b981; padding: 4px; border-radius: 6px; color: #09090b">
                        <rect width="20" height="12" x="2" y="6" rx="2"/><path d="M6 12h.01M9 12h.01M15 12h.01M18 12h.01"/>
                    </svg>
                    UNBLOCKED<span>GAMES</span>
                </a>

                <div class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search games...">
                </div>

                <div style="display: flex; gap: 1rem;">
                    <a href="https://github.com" target="_blank" style="color: #a1a1aa">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>PLAY WITHOUT <span style="color: #10b981; font-style: italic;">LIMITS.</span></h1>
            <p>The ultimate collection of unblocked browser games. No downloads, no blocks, just pure fun.</p>
        </section>

        <div class="filters" id="filters">
            <!-- Filters injected by JS -->
        </div>

        <div class="games-grid" id="games-grid">
            <!-- Games injected by JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="12" x="2" y="6" rx="2"/><path d="M6 12h.01M9 12h.01M15 12h.01M18 12h.01"/>
                    </svg>
                    UNBLOCKED GAMES HUB
                </div>
                <div style="color: #71717a; font-size: 0.875rem;">
                    © 2026 • Built for the web.
                </div>
                <div class="footer-links">
                    <a href="#">Privacy</a>
                    <a href="#">Terms</a>
                    <a href="#">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Game Player Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="control-btn" id="close-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
                <div class="overlay-title" id="overlay-title">Game Title</div>
            </div>
            <div class="overlay-controls">
                <button class="control-btn" id="reload-btn" title="Reload">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                </button>
                <button class="control-btn" id="fullscreen-btn" title="Fullscreen">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 3 6 6M9 21l-6-6M21 3v6h-6M3 21v-6h6"/></svg>
                </button>
            </div>
        </div>
        <div class="game-frame-container">
            <iframe id="game-frame" allow="fullscreen"></iframe>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
